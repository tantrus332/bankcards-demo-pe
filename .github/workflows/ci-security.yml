name: "CI Security Pipeline (DevSecOps)"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # 1. SCA: Trivy FS - scan dependencies
  sca-scan-fs:
    name: "SCA - Trivy Filesystem"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Trivy filesystem scan (table, block on Critical/High)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          scanners: "vuln"

      - name: Save Trivy FS JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          ignore-unfixed: true
          scanners: "vuln"
          output: "artifacts/trivy-fs-report.json"

      - name: Upload Trivy FS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: artifacts/trivy-fs-report.json
          retention-days: 30

  # 2. Image Scanning: Trivy image
  image-scan:
    name: "Image Scan - Trivy"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/bankcards-demo-pe-app:${{ github.sha }}
          load: true

      - name: Trivy image scan (table, block on Critical/High)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/bankcards-demo-pe-app:${{ github.sha }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Save Trivy image JSON report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/bankcards-demo-pe-app:${{ github.sha }}"
          format: "json"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"
          ignore-unfixed: true
          output: "artifacts/trivy-image-report.json"

      - name: Upload Trivy image report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: artifacts/trivy-image-report.json
          retention-days: 30

  # 3. Secret Detection: Gitleaks
  secret-detection:
    name: "Secret Detection - Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 90

  # 4. Security Gate
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [sca-scan-fs, secret-detection]
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          echo "SCA:           ${{ needs.sca-scan-fs.result }}"
          echo "Secrets:       ${{ needs.secret-detection.result }}"

          if [ "${{ needs.sca-scan-fs.result }}" = "failure" ] || \
             [ "${{ needs.secret-detection.result }}" = "failure" ]; then
            echo "SECURITY GATE FAILED"
            exit 1
          fi

          echo "SECURITY GATE PASSED"
