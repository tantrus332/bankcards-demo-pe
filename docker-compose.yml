version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bank_app
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-bank_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_DATA_REDIS_HOST=cache
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_PROFILES_ACTIVE=prod
      - APP_JWT_SECRET=${APP_JWT_SECRET:-supersecretkey}
      - APP_JWT_EXPIRATION=${APP_JWT_EXPIRATION:-86400000}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY:-encryptionkey}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - bank_network
    env_file:
      - .env

  db:
    image: postgres:15-alpine
    container_name: bank_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bank_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - bank_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bank_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: bank_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cache-data:/data
    networks:
      - bank_network

volumes:
  db-data:
  cache-data:

networks:
  bank_network:
    driver: bridge
